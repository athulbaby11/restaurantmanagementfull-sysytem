{% load static %}
{% include 'header.html' %}
<div class="container mt-4">
    <h2 class="mb-4">Add Gallery Image</h2>
    {% if success %}
        <div class="alert alert-success">Image added successfully.</div>
    {% endif %}
    <form method="post" enctype="multipart/form-data" class="card p-4 shadow-sm" style="max-width:500px;margin:auto;">
        {% csrf_token %}
        <div class="mb-3">
            <label for="image" class="form-label">Image</label>
            <input type="file" class="form-control" id="image" name="image" required>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" name="description" rows="2" placeholder="Enter description"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Add Image</button>
        <a href="{% url 'admin_gallery_list' %}" class="btn btn-secondary ms-2">Back to Gallery</a>
    </form>
</div>
{% include 'footer.html' %}
