{% load static %}
{% include 'header.html' %}

{% if success %}
<div id="successMsg" class="alert alert-success text-center py-2 mb-3" style="max-width: 400px; margin: 0 auto; border-radius: 8px; font-size: 1rem;">Registration successful!</div>
<script>
	setTimeout(function() {
		var msg = document.getElementById('successMsg');
		if (msg) msg.style.display = 'none';
	}, 2500);
</script>
{% endif %}
{% if error %}
<div class="alert alert-danger text-center py-2 mb-3" style="max-width: 500px; margin: 0 auto; border-radius: 8px; font-size: 1rem;">{{ error }}</div>
{% endif %}

<div class="container mt-5">
	<div class="row justify-content-center">
		<div class="col-md-6">
			<h2 class="mb-4 text-center">Register</h2>
			<form method="post" enctype="multipart/form-data">
				{% csrf_token %}
				<div class="mb-3">
					<label for="fullname" class="form-label">Full Name</label>
					<input type="text" class="form-control form-control-sm" id="fullname" name="fullname" required style="padding: 6px; height: 36px;">
				</div>
				<div class="mb-3">
					<label for="email" class="form-label">Email</label>
					<input type="email" class="form-control form-control-sm" id="email" name="email" required style="padding: 6px; height: 36px;">
				</div>
				<div class="mb-3">
					<label for="phone" class="form-label">Phone Number</label>
					<input type="tel" class="form-control form-control-sm" id="phone" name="phone" required style="padding: 6px; height: 36px;">
				</div>
				<div class="mb-3">
					<label for="photo" class="form-label">Photo</label>
					<input type="file" class="form-control form-control-sm" id="photo" name="photo" accept="image/*" required style="padding: 6px; height: 36px;">
					<div id="photoError" class="text-danger mt-1" style="display:none;">Image size must be less than 4MB.</div>
				</div>
				<div class="mb-3 position-relative">
					<label for="password" class="form-label">Password</label>
					<div class="input-group">
						<input type="password" class="form-control form-control-sm" id="password" name="password" required style="padding: 6px; height: 36px;">
						<span class="input-group-text" id="togglePassword" style="cursor:pointer">
							<i class="bi bi-eye-slash" id="passwordIcon"></i>
						</span>
					</div>
				</div>
				<div class="mb-3 position-relative">
					<label for="confirm_password" class="form-label">Confirm Password</label>
					<div class="input-group">
						<input type="password" class="form-control form-control-sm" id="confirm_password" name="confirm_password" required style="padding: 6px; height: 36px;">
						<span class="input-group-text" id="toggleConfirmPassword" style="cursor:pointer">
							<i class="bi bi-eye-slash" id="confirmPasswordIcon"></i>
						</span>
					</div>
					<div id="passwordError" class="text-danger mt-1" style="display:none;">Passwords do not match.</div>
				</div>
				<div class="mb-3">
					<label for="captcha" class="form-label">CAPTCHA</label>
					<div class="d-flex align-items-center gap-3 mb-2">
						<img src="{{ captcha_image_url }}" alt="CAPTCHA" style="height: 44px; border: 1px solid #ddd; border-radius: 4px;">
					</div>
					<input type="hidden" name="captcha_key" value="{{ captcha_key }}">
					<input type="text" class="form-control form-control-sm" id="captcha" name="captcha" required style="padding: 6px; height: 36px;" placeholder="Enter captcha text">
				</div>
				<button type="submit" class="btn btn-primary w-100 mb-4">Register</button>
			</form>
		</div>
	</div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script>
const password = document.getElementById('password');
const confirmPassword = document.getElementById('confirm_password');
const passwordError = document.getElementById('passwordError');
const form = document.querySelector('form');

function checkPasswordMatch() {
	if (password.value !== confirmPassword.value) {
		passwordError.style.display = 'block';
		return false;
	}
	passwordError.style.display = 'none';
	return true;
}

confirmPassword.addEventListener('input', checkPasswordMatch);
password.addEventListener('input', checkPasswordMatch);

form.addEventListener('submit', function(e) {
	if (!checkPasswordMatch()) {
		e.preventDefault();
		return;
	}
	const photo = document.getElementById('photo');
	const photoError = document.getElementById('photoError');
	if (photo.files.length > 0 && photo.files[0].size > 4 * 1024 * 1024) {
		photoError.style.display = 'block';
		e.preventDefault();
	}
});

document.getElementById('photo').addEventListener('change', function() {
	const photoError = document.getElementById('photoError');
	if (this.files.length > 0 && this.files[0].size > 4 * 1024 * 1024) {
		photoError.style.display = 'block';
		alert('Image size must be less than 4MB');
		this.value = '';
	} else {
		photoError.style.display = 'none';
	}
});

function togglePasswordVisibility(inputId, iconId) {
	const input = document.getElementById(inputId);
	const icon = document.getElementById(iconId);
	if (input.type === 'password') {
		input.type = 'text';
		icon.classList.remove('bi-eye-slash');
		icon.classList.add('bi-eye');
	} else {
		input.type = 'password';
		icon.classList.remove('bi-eye');
		icon.classList.add('bi-eye-slash');
	}
}

document.getElementById('togglePassword').addEventListener('click', function() {
	togglePasswordVisibility('password', 'passwordIcon');
});
document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
	togglePasswordVisibility('confirm_password', 'confirmPasswordIcon');
});
</script>

{% include 'footer.html' %}
