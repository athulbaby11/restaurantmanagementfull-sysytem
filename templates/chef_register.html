{% load static %}
{% include 'header.html' %}
<div class="container mt-5">
    <h2 class="mb-4 text-center" style="font-weight:700; letter-spacing:2px; color:#f39c12;">Chef Registration</h2>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <form method="post" action="" enctype="multipart/form-data">
                                                {% if error %}
                                                <div class="alert alert-danger">Not Successful: {{ error }}</div>
                                                {% endif %}
                                                {% if success %}
                                                <div class="alert alert-success">Successful</div>
                                                {% endif %}
                                <div class="mb-3">
                                    <label for="image" class="form-label">Profile Image</label>
                                    <input type="file" name="image" id="image" class="form-control form-control-sm" accept="image/*">
                                </div>
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" name="username" id="username" class="form-control form-control-sm" required>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="text" name="phone" id="phone" class="form-control form-control-sm" required maxlength="15">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                                    <input type="email" name="email" id="email" class="form-control form-control-sm" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" name="password" id="password" class="form-control form-control-sm" required>
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password')"><i class="bi bi-eye"></i></button>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <input type="password" name="confirm_password" id="confirm_password" class="form-control form-control-sm" required>
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirm_password')"><i class="bi bi-eye"></i></button>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="captcha" class="form-label">CAPTCHA</label>
                    <div class="d-flex align-items-center gap-3 mb-2">
                        <img src="{{ captcha_image_url }}" alt="CAPTCHA" style="height: 44px; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                    <input type="hidden" name="captcha_key" value="{{ captcha_key }}">
                    <input type="text" name="captcha" id="captcha" class="form-control form-control-sm" required placeholder="Enter captcha text">
                </div>
                <script>
                function togglePassword(fieldId) {
                    var pwd = document.getElementById(fieldId);
                    if (pwd.type === 'password') {
                        pwd.type = 'text';
                    } else {
                        pwd.type = 'password';
                    }
                }
                </script>
                <div class="d-grid mt-4 mb-5">
                    <button type="submit" class="btn btn-success btn-lg">Register</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% include 'footer.html' %}
