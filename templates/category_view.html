{% load static %}
{% include 'header.html' %}

<div class="container mt-5">
	<div class="row justify-content-center">
		<div class="col-md-8">
			<div class="card shadow">
				<div class="card-body">
					<h3 class="mb-4 text-center">Categories</h3>
					<form method="post" enctype="multipart/form-data" class="mb-4">
						{% csrf_token %}
						<div class="mb-3">
							<label for="main_category" class="form-label">Main Category</label>
							<select class="form-control" id="main_category" name="main_category" required>
								<option value="">Select Main Category</option>
								{% for cat in main_categories %}
									<option value="{{ cat.id }}">{{ cat.name }}</option>
								{% endfor %}
							</select>
						</div>
						<div class="mb-3">
							<label for="category_name" class="form-label">Category Name</label>
							<input type="text" class="form-control" id="category_name" name="category_name" required>
						</div>
						<div class="mb-3">
							<label for="category_image" class="form-label">Image (optional)</label>
							<input type="file" class="form-control" id="category_image" name="category_image" accept="image/*">
						</div>
						<div class="mb-3">
							<label for="category_price" class="form-label">Price (optional)</label>
							<input type="number" step="0.01" class="form-control" id="category_price" name="category_price">
						</div>
						<button type="submit" class="btn btn-primary w-100">Add Category</button>
					</form>
				</div>
			</div>
		</div>
	</div>
</div>
{% include 'footer.html' %}
