{% load static %}
{% include 'header.html' %}

<div class="container mt-5">
	<h2 class="mb-4 text-center" style="font-weight:700; letter-spacing:2px; color:#f39c12;">Our Chefs</h2>
	<div class="table-responsive">
		<table class="table table-bordered table-hover align-middle">
			<thead class="table-dark">
				<tr>
					<th>Image</th>
					<th>Name</th>
					<th>Phone</th>
					<th>Email</th>
					<th>Update</th>
					<th>Delete</th>
				</tr>
			</thead>
			<tbody>
				{% for chef in chefs %}
				<tr>
					<td>
						{% if chef.image %}
							<img src="{{ chef.image.url }}" alt="{{ chef.name }}" style="width:60px;height:60px;object-fit:cover;border-radius:8px;">
						{% else %}
							<img src="{% static 'image/default_food.png' %}" alt="No Image" style="width:60px;height:60px;object-fit:cover;border-radius:8px;">
						{% endif %}
					</td>
					<td>{{ chef.name }}</td>
					<td>{{ chef.phone }}</td>
					<td>{{ chef.email }}</td>
					<td>
						<a href="{% url 'chef_update' chef.id %}" class="btn btn-warning btn-sm">Update</a>
					</td>
					<td>
						<form method="post" action="{% url 'chef_delete' chef.id %}" style="display:inline;">
							{% csrf_token %}
							<button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this chef?');">Delete</button>
						</form>
					</td>
				</tr>
				{% endfor %}
			</tbody>
		</table>
	</div>
</div>
{% include 'footer.html' %}
