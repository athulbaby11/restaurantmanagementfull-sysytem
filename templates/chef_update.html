{% load static %}
{% include 'header.html' %}
<div class="container mt-5">
    <h2 class="mb-4 text-center" style="font-weight:700; letter-spacing:2px; color:#f39c12;">Update Chef Details</h2>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <form method="post" action="" enctype="multipart/form-data">
                {% if error %}
                <div class="alert alert-danger">Not Successful: {{ error }}</div>
                {% endif %}
                {% if success %}
                <div class="alert alert-success">Successful</div>
                {% endif %}
                <div class="mb-3">
                    <label for="image" class="form-label">Profile Image</label>
                    <input type="file" name="image" id="image" class="form-control form-control-sm" accept="image/*">
                </div>
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" name="username" id="username" class="form-control form-control-sm" value="{{ chef.name }}" required>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="text" name="phone" id="phone" class="form-control form-control-sm" value="{{ chef.phone }}" required maxlength="15">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" name="email" id="email" class="form-control form-control-sm" value="{{ chef.email }}" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" name="password" id="password" class="form-control form-control-sm">
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()"><i class="bi bi-eye"></i></button>
                    </div>
                    <small class="text-muted">Leave blank to keep current password</small>
                </div>
                <div class="mb-3">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <input type="password" name="confirm_password" id="confirm_password" class="form-control form-control-sm">
                    <small class="text-muted">Leave blank to keep current password</small>
                </div>
                <div class="d-grid mt-4 mb-3">
                    <button type="submit" class="btn btn-success btn-lg">Update Chef</button>
                </div>
                <div class="d-grid mb-5">
                    <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-primary btn-lg">Back to Dashboard</a>
                </div>
            <script>
            function togglePassword() {
                var pwd = document.getElementById('password');
                if (pwd.type === 'password') {
                    pwd.type = 'text';
                } else {
                    pwd.type = 'password';
                }
            }
            </script>
            </form>
        </div>
    </div>
</div>
{% include 'footer.html' %}
