{% load static %}
{% include 'header.html' %}

<div class="container mt-5 d-flex justify-content-center">
	<div class="card shadow" style="max-width: 350px; width: 100%; border-radius: 16px;">
		<div class="card-body">
			<h3 class="mb-4 text-center">Login</h3>
			<form method="post">
				{% csrf_token %}
				<div class="mb-3">
					<label for="usermail" class="form-label">Username</label>
					<input type="text" class="form-control form-control-sm" id="usermail" name="usermail" required style="padding: 6px; height: 36px;">
				</div>
				<div class="mb-3 position-relative">
					<label for="password" class="form-label">Password</label>
					<div class="input-group">
						<input type="password" class="form-control form-control-sm" id="userpassword" name="userpassword" required style="padding: 6px; height: 36px;">
						<span class="input-group-text" id="togglePassword" style="cursor:pointer">
							<i class="bi bi-eye-slash" id="passwordIcon"></i>
						</span>
					</div>
				</div>
				<button type="submit" class="btn btn-primary w-100 mb-2">Login</button>
			</form>
		</div>
	</div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script>
function togglePasswordVisibility(inputId, iconId) {
	const input = document.getElementById(inputId);
	const icon = document.getElementById(iconId);
	if (input.type === 'password') {
		input.type = 'text';
		icon.classList.remove('bi-eye-slash');
		icon.classList.add('bi-eye');
	} else {
		input.type = 'password';
		icon.classList.remove('bi-eye');
		icon.classList.add('bi-eye-slash');
	}
}
document.getElementById('togglePassword').addEventListener('click', function() {
	togglePasswordVisibility('password', 'passwordIcon');
});
</script>
{% include 'footer.html' %}
